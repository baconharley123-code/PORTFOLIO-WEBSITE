<!DOCTYPE html>
<html>
<head>
    <title>Activity 4</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to bottom right, #023e8a, #0077b6);
            font-family: Arial, sans-serif;
        }

        form {
            background-color: #caf0f8; /* Light sea foam */
            padding: 30px 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
            width: 400px;
        }

        h2 {
            text-align: center;
            color: #023e8a;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
        }

        td {
            padding: 8px 5px;
            font-size: 14px;
            color: #023e8a;
        }

        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #0077b6;
            background-color: #90e0ef; /* Light aqua */
            box-sizing: border-box;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        select:focus {
            outline: none;
            border: 1px solid #023e8a;
            box-shadow: 0 0 6px rgba(0, 119, 182, 0.6);
        }

        input[type="radio"],
        input[type="checkbox"] {
            accent-color: #0077b6;
        }

        button {
            padding: 10px 18px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
            transition: 0.3s ease;
        }

        button[type="submit"] {
            background-color: #0077b6;
            color: white;
        }

        button[type="submit"]:hover {
            background-color: #023e8a;
        }

        button[type="reset"] {
            background-color: #90e0ef;
            color: #023e8a;
        }

        button[type="reset"]:hover {
            background-color: #48cae4;
        }

    </style>
</head>

<body>

<form action="" method="post">
    <h2>User Information Form</h2>

    <table>
        <tr>
            <td>First Name:</td>
            <td><input type="text" name="firstname" required></td>
        </tr>

        <tr>
            <td>Last Name:</td>
            <td><input type="text" name="lastname" required></td>
        </tr>

        <tr>
            <td>Age:</td>
            <td><input type="number" name="age"></td>
        </tr>

        <tr>
            <td>Gender:</td>
            <td>
                <input type="radio" name="gender" value="male"> Male
                <input type="radio" name="gender" value="female"> Female
                <input type="radio" name="gender" value="other"> Other
            </td>
        </tr>

        <tr>
            <td>Hobbies:</td>
            <td>
                <input type="checkbox" name="hobby[]" value="Gaming"> Gaming<br>
                <input type="checkbox" name="hobby[]" value="Sleeping"> Sleeping<br>
                <input type="checkbox" name="hobby[]" value="Eating"> Eating<br>
                <input type="checkbox" name="hobby[]" value="Drinking Coffee"> Drinking Coffee<br>
                <input type="checkbox" name="hobby[]" value="Traveling"> Traveling
            </td>
        </tr>

        <tr>
            <td>Year Level:</td>
            <td>
                <select name="year-level">
                    <option>1st Year</option>
                    <option>2nd Year</option>
                    <option>3rd Year</option>
                    <option>4th Year</option>
                </select>
            </td>
        </tr>

        <tr>
            <td colspan="2" align="center">
                <button type="submit">Submit</button>
                <button type="reset">Clear</button>
            </td>
        </tr>
    </table>
</form>

</body>
</html>
